services:
  # ─────────────────────────────────────────────
  # Octa Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm octa-agent -m "Hello"
  # ─────────────────────────────────────────────
  octa-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: octa:latest
    container_name: octa-agent
    profiles:
      - agent
    volumes:
      - ./data:/root/.octa
    environment:
      - HOME=/root
    entrypoint: ["octa", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Octa Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml --profile gateway up -d
  # ─────────────────────────────────────────────
  octa-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: octa:latest
    container_name: octa-gateway
    restart: on-failure
    profiles:
      - gateway
    volumes:
      - ./data:/root/.octa
    environment:
      - HOME=/root
